# ENFILADE · hypridle
general {
    lock_cmd          = pidof hyprlock || hyprlock
    before_sleep_cmd  = loginctl lock-session
    after_sleep_cmd   = hyprctl dispatch dpms on
}
listener { timeout = 480;  on-timeout = loginctl lock-session }
listener { timeout = 720;  on-timeout = hyprctl dispatch dpms off
                           on-resume  = hyprctl dispatch dpms on }
# Auto-suspend is OPT-IN: you reported crash-on-sleep on the current setup.
# Diagnose first (journalctl -b -1 -p err right after a bad resume — look for
# amdgpu vs Hyprland dying first), then uncomment:
# listener { timeout = 2400; on-timeout = systemctl suspend }
