# ENFILADE · rooms.conf — six rooms + the console layer
# windowrule syntax: 0.53+ match:/effect form (wiki → Configuring/Basics/Window-Rules)

# ── room definitions ────────────────────────────────────────────────
workspace = 1, defaultName:ATELIER,   layout:scrolling
workspace = 2, defaultName:CABLES
workspace = 3, defaultName:ARCHIVE
workspace = 4, defaultName:LISTENING
workspace = 5, defaultName:CANVAS, gapsin:0, gapsout:0, bordersize:0, rounding:false
workspace = 6, defaultName:ARCADE

# ── residents (theme resolves from the room a window LANDS on) ──────
windowrule = match:class ^(obsidian)$, workspace 5
windowrule = match:class ^(obsidian)$, fullscreen on
windowrule = match:class ^(steam)$, workspace 6 silent
windowrule = match:class ^(steam_app_\d+)$, workspace 6
# tearing OK in-game
windowrule = match:class ^(steam_app_\d+)$, immediate on
windowrule = match:class ^(vesktop)$, workspace 2 silent
windowrule = match:class ^(Cider)$, workspace 4 silent
windowrule = match:class ^(firefox)$, workspace 3
windowrule = match:class ^(steam)$, match:title ^(Friends List|Steam Settings)$, float on
# canvas purity: anything fullscreen drops its border
windowrule = match:fullscreen on, border_size 0
windowrule = match:class ^(steam_app_\d+|mpv)$, idle_inhibit fullscreen

# room-born terminals: room-exec sets these classes so palettes stick
windowrule = match:class ^(kitty-atelier)$,   workspace 1 silent
windowrule = match:class ^(kitty-cables)$,    workspace 2 silent
windowrule = match:class ^(kitty-archive)$,   workspace 3 silent
windowrule = match:class ^(kitty-listening)$, workspace 4 silent
windowrule = match:class ^(kitty-arcade)$,    workspace 6 silent

# ── the console layer: every utility is a summonable TUI ───────────
# fixed neutral skin (engine/console) so system chrome reads the same
# from any room. Waybar icons summon these too.
windowrule = match:class ^(console-)(.*)$, float on
windowrule = match:class ^(console-)(.*)$, size (monitor_w*0.62) (monitor_h*0.68)
windowrule = match:class ^(console-)(.*)$, center on
windowrule = match:class ^(console-audio)$,   workspace special:audio silent
windowrule = match:class ^(console-bt)$,      workspace special:bt silent
windowrule = match:class ^(console-net)$,     workspace special:net silent
windowrule = match:class ^(console-cal)$,     workspace special:cal silent
windowrule = match:class ^(console-music)$,   workspace special:music silent
windowrule = match:class ^(console-files)$,   workspace special:files silent
windowrule = match:class ^(console-monitor)$, workspace special:monitor silent
# rmpc mini (tall) and yazi (wide) size overrides — last rule wins
windowrule = match:class ^(console-music)$, size (monitor_w*0.46) (monitor_h*0.78)
windowrule = match:class ^(console-files)$, size (monitor_w*0.70) (monitor_h*0.74)
