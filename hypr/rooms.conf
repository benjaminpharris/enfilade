# ENFILADE · rooms.conf — six rooms + the console layer

# ── room definitions ────────────────────────────────────────────────
workspace = 1, defaultName:ATELIER,   layout:scrolling
workspace = 2, defaultName:CABLES
workspace = 3, defaultName:ARCHIVE
workspace = 4, defaultName:LISTENING
workspace = 5, defaultName:CANVAS, gapsin:0, gapsout:0, bordersize:0, rounding:false
workspace = 6, defaultName:ARCADE

# ── residents (theme resolves from the room a window LANDS on) ──────
windowrulev2 = workspace 5,  class:^(obsidian)$
windowrulev2 = fullscreen,   class:^(obsidian)$
windowrulev2 = workspace 6 silent, class:^(steam)$
windowrulev2 = workspace 6,  class:^(steam_app_\d+)$
windowrulev2 = immediate,    class:^(steam_app_\d+)$      # tearing OK in-game
windowrulev2 = workspace 2 silent, class:^(vesktop)$
windowrulev2 = workspace 4 silent, class:^(Cider)$
windowrulev2 = workspace 3,  class:^(firefox)$
windowrulev2 = float, class:^(steam)$, title:^(Friends List|Steam Settings)$
windowrulev2 = noborder, fullscreen:1                     # canvas purity
windowrulev2 = idleinhibit fullscreen, class:^(steam_app_\d+|mpv)$

# room-born terminals: room-exec sets these classes so palettes stick
windowrulev2 = workspace 1 silent, class:^(kitty-atelier)$
windowrulev2 = workspace 2 silent, class:^(kitty-cables)$
windowrulev2 = workspace 3 silent, class:^(kitty-archive)$
windowrulev2 = workspace 4 silent, class:^(kitty-listening)$
windowrulev2 = workspace 6 silent, class:^(kitty-arcade)$

# ── the console layer: every utility is a summonable TUI ───────────
# fixed neutral skin (engine/console) so system chrome reads the same
# from any room. Waybar icons summon these too.
windowrulev2 = float,            class:^(console-)(.*)$
windowrulev2 = size 62% 68%,     class:^(console-)(.*)$
windowrulev2 = center,           class:^(console-)(.*)$
windowrulev2 = workspace special:audio silent,   class:^(console-audio)$
windowrulev2 = workspace special:bt silent,      class:^(console-bt)$
windowrulev2 = workspace special:net silent,     class:^(console-net)$
windowrulev2 = workspace special:cal silent,     class:^(console-cal)$
windowrulev2 = workspace special:music silent,   class:^(console-music)$
windowrulev2 = workspace special:files silent,   class:^(console-files)$
windowrulev2 = workspace special:monitor silent, class:^(console-monitor)$
windowrulev2 = size 46% 78%, class:^(console-music)$      # rmpc mini, tall
windowrulev2 = size 70% 74%, class:^(console-files)$
