# ENFILADE · looks.conf — one geometry, six colorways
# col.active_border is LIVE state: spaced rewrites it per room.

general {
    layout            = dwindle          # rooms override (1 = scrolling)
    gaps_in           = 6
    gaps_out          = 14
    border_size       = 2
    col.active_border   = rgba(7fb4caee) rgba(a3be8cee) 45deg
    col.inactive_border = rgba(2a2e3aaa)
    resize_on_border  = true
}

# the Atelier's infinite strip (Hyprland ≥0.54 built-in)
scrolling {
    column_width             = 0.55
    fullscreen_on_one_column = true
    focus_fit_method         = 1        # fit, don't recenter
    follow_focus             = true
    explicit_column_widths   = 0.33, 0.5, 0.55, 0.67, 1.0
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

decoration {
    rounding = 10
    blur {
        enabled  = true
        size     = 7
        passes   = 3
        vibrancy = 0.18
        popups   = true
    }
    shadow {
        enabled      = true
        range        = 18
        render_power = 3
        color        = rgba(00000055)
    }
    dim_special = 0.25                   # console layer floats on a hush
}

animations {
    enabled = true
    bezier  = glide, 0.22, 1.0, 0.36, 1.0
    bezier  = soft,  0.25, 0.9, 0.30, 1.02
    animation = windows,     1, 4,  glide, popin 92%
    animation = windowsOut,  1, 4,  soft,  popin 92%
    animation = border,      1, 6,  default
    animation = fade,        1, 4,  default
    animation = workspaces,  1, 5,  glide, slide      # walking the suite
    animation = specialWorkspace, 1, 4, glide, slidefadevert 8%
}
