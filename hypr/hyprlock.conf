# ENFILADE · hyprlock — the house at rest
general { hide_cursor = true }

background {
    monitor =
    path    = screenshot
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
    vibrancy    = 0.2
}

label {
    monitor =
    text        = $TIME
    font_family = JetBrainsMono Nerd Font
    font_size   = 96
    color       = rgba(e6e2d8ee)
    position    = 0, 120
    halign      = center
    valign      = center
}
label {
    monitor =
    text        = enfilade · locked
    font_family = JetBrainsMono Nerd Font
    font_size   = 13
    color       = rgba(e6e2d877)
    position    = 0, 38
    halign      = center
    valign      = center
}
input-field {
    monitor =
    size            = 280, 48
    rounding        = 10
    outline_thickness = 2
    outer_color     = rgba(7fb4cacc)
    inner_color     = rgba(14161dcc)
    font_color      = rgba(e6e2d8ee)
    placeholder_text = <i>· · ·</i>
    fade_on_empty   = true
    position        = 0, -90
    halign          = center
    valign          = center
}
