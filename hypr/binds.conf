# ENFILADE · binds.conf
# walking:  SUPER+N rooms · SUPER+ALT+N carry window (your KDE muscle memory)

# ── core ────────────────────────────────────────────────────────────
bind = $mod, RETURN, exec, ~/.local/bin/room-exec $term
bind = $mod, SPACE,  exec, fuzzel
bind = $mod, Q,      killactive
bind = $mod, F,      fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod, L,      exec, hyprlock
bind = $mod SHIFT, R, exec, hyprctl reload && pkill -SIGUSR2 waybar
bind = $mod SHIFT, E, exit

# ── rooms ───────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod, TAB,   workspace, previous

# focus / carry within a room
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Atelier strip (scrolling layoutmsgs; harmless elsewhere)
bind = $mod, bracketleft,        layoutmsg, move -col
bind = $mod, bracketright,       layoutmsg, move +col
bind = $mod SHIFT, bracketleft,  layoutmsg, swapcol l
bind = $mod SHIFT, bracketright, layoutmsg, swapcol r
bind = $mod, equal, layoutmsg, colresize +0.12
bind = $mod, minus, layoutmsg, colresize -0.12

# ── console layer (the shiny drawer of TUIs) ───────────────────────
bind = $mod, A, exec, ~/.local/bin/scratch audio   wiremix
bind = $mod, B, exec, ~/.local/bin/scratch bt      bluetui
bind = $mod, W, exec, ~/.local/bin/scratch net     "$($HOME/.local/bin/wifi-tui)"
bind = $mod, C, exec, ~/.local/bin/scratch cal     calcure
bind = $mod, M, exec, ~/.local/bin/scratch music   rmpc
bind = $mod, E, exec, ~/.local/bin/scratch files   yazi
bind = $mod, grave, exec, ~/.local/bin/scratch monitor btop
bind = $mod, V, exec, cliphist list | fuzzel --dmenu -p ' ' | cliphist decode | wl-copy

# ── flagship summons ───────────────────────────────────────────────
bind = $mod, G, exec, ~/.local/bin/canvas-new            # fresh Excalidraw, on-palette
bind = $mod, P, exec, ~/.local/bin/steam-picker          # library through fuzzel
bind = $mod, D, exec, ~/.local/bin/room-exec --room 2 endcord
bind = $mod SHIFT, D, exec, vesktop

# ── capture ────────────────────────────────────────────────────────
bind = , PRINT,      exec, grim -g "$(slurp)" - | satty -f - --early-exit --copy-command wl-copy
bind = $mod, PRINT,  exec, grim - | satty -f - --early-exit

# ── media & osd ────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +3
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -3
bindl  = , XF86AudioMute,        exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness +5
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness -5
