# ╔══════════════════════════════════════════════════════════════════╗
# ║  ENFILADE · hyprland.conf            six rooms, doorways aligned  ║
# ╚══════════════════════════════════════════════════════════════════╝
# hyprlang — runs on 0.54+ (0.55 deprecates this in favor of Lua; see
# README "honest edges". hyprconf2lua converts when you're ready.)

$mod   = SUPER
$term  = kitty
$cfg   = ~/.config/enfilade

monitor = , preferred, auto, 1

source = ~/.config/hypr/looks.conf
source = ~/.config/hypr/rooms.conf
source = ~/.config/hypr/binds.conf

# ── session ──────────────────────────────────────────────────────────
exec-once = $cfg/engine/spaced                       # the room daemon
exec-once = waybar
exec-once = mako
exec-once = swww-daemon && sleep 0.4 && ~/.local/bin/wall-set 1   # first wallpaper
exec-once = hypridle
exec-once = swayosd-server
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

input {
    kb_layout      = us
    follow_mouse   = 1
    sensitivity    = 0
    touchpad {
        natural_scroll = true
    }
}

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
    vrr                      = 1     # arcade-friendly; 2 = fullscreen-only
}
