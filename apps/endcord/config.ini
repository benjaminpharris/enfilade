; ENFILADE · endcord starter
; endcord merges this with its own defaults and writes the full config back
; on first run — anything missing is back-filled, so this file stays minimal
; on purpose. The visual theming is NOT here: it comes from the terminal
; palette of the room endcord is summoned into (see README.md).
;
; Settings worth flipping once the generated config appears:
;   · desktop notifications  → on  (mako will wear the room's colors)
;   · RPC / rich presence    → your call; it's one more ToS surface
;   · media as ASCII         → on; kitty + JetBrainsMono NF renders it well
;   · theme                  → `legacy` only if default glyphs misrender
