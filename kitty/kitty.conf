# ENFILADE · kitty — birth-palette terminal
# Color comes from the room this window opens in, via the include below.
# Read once at spawn → window keeps its room's skin for life. By design.
include ~/.config/enfilade/current/kitty.conf

font_family       JetBrainsMono Nerd Font
font_size         11.5
modify_font       cell_height 118%

cursor_shape          beam
cursor_trail          3            # the shiny: cursor leaves a comet tail
cursor_trail_decay    0.1 0.3

window_padding_width  10
background_opacity    0.93
background_blur       1            # hyprland blur does the heavy lifting
hide_window_decorations yes
confirm_os_window_close 0

scrollback_lines      12000
enable_audio_bell     no
visual_bell_duration  0

tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      2

allow_remote_control  socket-only
listen_on             unix:/tmp/kitty-{kitty_pid}

# graphics protocol is the load-bearing choice from the brainstorm:
# yazi previews, rmpc album art, all of it rides on this. kitty = native.

map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+t      new_tab_with_cwd
