# ENFILADE · fuzzel — relaunches fresh each summon, so it ALWAYS wears
# the current room. Colors come from the include at the bottom.
[main]
font=JetBrainsMono Nerd Font:size=12
prompt=" ❯ "
icon-theme=Papirus-Dark
lines=10
width=42
horizontal-pad=22
vertical-pad=14
inner-pad=8
layer=overlay
terminal=kitty

[border]
width=2
radius=12

include=~/.config/enfilade/current/fuzzel.ini
