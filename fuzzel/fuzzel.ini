# ENFILADE · fuzzel — relaunches fresh each summon, so it ALWAYS wears
# the current room. include is a [main]-section option, hence its placement.
[main]
include=~/.config/enfilade/current/fuzzel.ini
font=JetBrainsMono Nerd Font:size=12
prompt=" ❯ "
icon-theme=Papirus-Dark
lines=10
width=42
horizontal-pad=22
vertical-pad=14
inner-pad=8
layer=overlay
terminal=kitty

[border]
width=2
radius=12
