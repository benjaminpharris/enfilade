; ENFILADE · calcure — colors are ANSI indices: the room paints the month.
; Data layer: pair with vdirsyncer+khal (tuis/khal-notes.md) or calcure's own
; events; `calcure --import` pulls from calcurse if you have history there.
[Parameters]
default_view = calendar
show_keybindings = no
show_current_time = yes
use_unicode_icons = yes
show_weather = no
start_week_day = 1
cut_titles_by_cell_length = yes
event_icon = ●
today_icon = ◆
birthdays_from_abook = no

[Colors]
color_today = 4
color_active_pane = 4
color_events = 6
color_days = 7
color_day_names = 4
color_weekends = 1
color_weekend_names = 1
color_hints = 8
color_prompts = 8
color_deadlines = 3
color_important = 1
color_unimportant = 8
color_timer = 2
color_time = 8
color_title = 4
color_calendar_header = 4
color_background = -1
